<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Sebastián</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <header>
    <div class="contenedor">
      <a href="../index.html" class="logo">&lt;/Sebastián&gt;</a>

      <nav>
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="sobre-mi.html">Sobre mí</a></li>
          <li><a href="proyectos.html">Proyectos</a></li>
          <li><a href="contacto.html" class="activo">Contacto</a></li>
        </ul>
      </nav>

      <!-- reloj actualizado por main.js -->
      <span class="reloj-header" id="reloj">00:00:00</span>
    </div>
  </header>

  <main>
    <div class="contenedor">

      <section>
        <h2>Contacto</h2>
        <p style="margin-bottom: 1.8rem; opacity: 0.85;">
          ¿Tienes alguna pregunta o propuesta? Completa el formulario y te responderé a la brevedad.
        </p>

        <!--
          method GET para que los datos sean visibles en la URL (requisito del lab).
          main.js guarda automáticamente lo que escribes en localStorage
          por si cierras la pestaña sin querer.
        -->
        <form id="form-contacto" class="form-contacto" action="resultado.html" method="GET">

          <!-- nombre -->
          <div class="form-grupo">
            <label for="nombre">Nombre completo *</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>

          <!-- correo -->
          <div class="form-grupo">
            <label for="correo">Correo electrónico *</label>
            <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required>
          </div>

          <!-- teléfono, opcional -->
          <div class="form-grupo">
            <label for="telefono">Teléfono (opcional)</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+57 300 000 0000">
          </div>

          <!-- select de asunto -->
          <div class="form-grupo">
            <label for="asunto">Asunto</label>
            <select id="asunto" name="asunto">
              <option value="colaboracion">Colaboración en proyecto</option>
              <option value="consulta">Consulta técnica</option>
              <option value="trabajo">Oferta de trabajo</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <!-- radio buttons de medio de contacto -->
          <div class="form-grupo">
            <label>Medio de contacto preferido</label>
            <div class="radio-grupo">
              <label>
                <input type="radio" name="medio" value="correo" checked>
                Correo
              </label>
              <label>
                <input type="radio" name="medio" value="telefono">
                Teléfono
              </label>
              <label>
                <input type="radio" name="medio" value="whatsapp">
                WhatsApp
              </label>
            </div>
          </div>

          <!-- área de mensaje -->
          <div class="form-grupo">
            <label for="mensaje">Mensaje *</label>
            <textarea id="mensaje" name="mensaje" placeholder="Escribe aquí tu mensaje..." required></textarea>
          </div>

          <!-- checkbox de términos -->
          <div class="form-grupo check-grupo">
            <label>
              <input type="checkbox" name="terminos" value="aceptado" required>
              Acepto los términos y condiciones *
            </label>
          </div>

          <!-- botones de enviar y limpiar -->
          <div class="form-acciones">
            <button type="submit" class="btn">Enviar mensaje</button>
            <button type="reset" class="btn btn-reset">Limpiar</button>
          </div>

        </form>
      </section>

    </div>
  </main>

  <footer>
    <div class="contenedor">
      <p>© 2026 Sebastián | Laboratorio 4 - Desarrollo Web</p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
